name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

      - name: Build e Push imagem
        env:
          ECR_REGISTRY: 905663669292.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: site_prod
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 905663669292.dkr.ecr.us-east-1.amazonaws.com
            docker pull 905663669292.dkr.ecr.us-east-1.amazonaws.com/site_prod:latest
            docker stop website || true
            docker run -d --name website -p 80:80 --rm 905663669292.dkr.ecr.us-east-1.amazonaws.com/site_prod:latest
